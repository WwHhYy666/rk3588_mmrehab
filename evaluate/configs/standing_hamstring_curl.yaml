action_id: "standing_hamstring_curl"
action_name: "站姿屈膝后勾腿"
primary_metric: "hamstring_curl_flexion_angle"
metric_unit: "degree"
metric_direction: "increase"
medical_basis:
  - "AAOS Knee Conditioning Program: https://orthoinfo.aaos.org/en/recovery/knee-conditioning-program/"
  - "AAOS Knee Exercises: https://orthoinfo.aaos.org/en/staying-healthy/knee-exercises"
  - "Mayo Clinic hamstring curl: https://www.mayoclinic.org/healthy-lifestyle/fitness/multimedia/hamstring-curl/vid-20084673"
keypoint_rule:
  hip_index: 23
  knee_index: 25
  ankle_index: 27
  target_joint: "left_knee"
angle_field: "target_angle_smoothed"
angle_fields:
  - "target_angle_smoothed"
  - "selected_flexion_angle_smoothed"
  - "selected_flexion_angle_raw"
  - "flexion_angle_3d"
  - "flexion_angle_2d"
metric_note: "站姿屈膝后勾腿按髋-膝-踝计算膝关节屈曲角；医生模板决定本患者小腿后勾幅度、保持时间和节奏目标。"
thresholds:
  rom_diff_max: 10.0
  tut_ratio_min: 0.8
  dtw_normalized_max: 0.25
  speed_ratio_max: 1.5
tut_work_zone:
  mode: "relative_to_max"
  offset_low: -10.0
  offset_high: 0.0
realtime:
  start_delta: 8.0
  return_delta: 5.0
  min_rep_seconds: 1.0
  raise_prompt: "小腿再往后弯一点"
