ROM_LOW:
  screen:
    color: "red"
    title: "动作不到位"
    template: "再站起来一点"
    templates:
      - "再站起来一点"
      - "髋部再向上起一点"
      - "身体再站高一点"
  tts:
    template: "再站起来一点"
    templates:
      - "这次还没有站到位，身体再站高一点。"
      - "髋部再向上起一点，到位后再坐下。"
      - "站起幅度还差一点，再试一次。"
    priority: "low"
  motor:
    pattern: "short_double"
TUT_LOW:
  screen:
    color: "orange"
    title: "保持时间不足"
    template: "站稳一下"
    templates:
      - "站稳一下"
      - "站起来后停一下"
      - "别急着坐下"
  tts:
    template: "站稳一下"
    templates:
      - "站起来以后先稳住，再慢慢坐下。"
      - "保持时间还不够，这次不计数。"
      - "不要急着坐下，先站稳一下。"
    priority: "medium"
  motor:
    pattern: "interval"
SHAPE_BAD:
  screen:
    color: "yellow"
    title: "轨迹不标准"
    template: "按示范节奏完成"
    templates:
      - "按示范节奏完成"
      - "身体向上站起，不要晃"
      - "坐下时稳一点"
  tts:
    template: "按示范节奏完成"
    templates:
      - "身体向上站起，不要左右晃。"
      - "按示范节奏来，坐下时稳一点。"
      - "站起和坐下都保持平稳。"
    priority: "low"
  motor:
    pattern: "short_once"
TOO_FAST:
  screen:
    color: "yellow"
    title: "动作未完成"
    template: "动作再稳一点"
    templates:
      - "动作再稳一点"
      - "站起和坐下都稳一些"
      - "节奏放稳"
  tts:
    template: "动作再稳一点"
    templates:
      - "动作再稳一点。"
      - "站起和坐下都要稳。"
      - "请控制住身体。"
    priority: "medium"
  motor:
    pattern: "short_once"
EARLY_RETURN:
  screen:
    color: "red"
    title: "提前坐下"
    template: "站到位后再坐下"
    templates:
      - "站到位后再坐下"
      - "还没站高就坐下了"
      - "先站稳再回来"
  tts:
    template: "站到位后再坐下"
    templates:
      - "还没站到位就坐下了，下一次先站稳。"
      - "先站高一点，再慢慢坐下。"
      - "这次提前回来了，站到位后再回来。"
    priority: "low"
  motor:
    pattern: "short_double"
VISIBILITY_LOW:
  screen:
    color: "yellow"
    title: "关键点不可见"
    template: "请保持身体在画面内"
    templates:
      - "请保持身体在画面内"
      - "侧对镜头，别离开画面"
      - "髋、膝、踝保持可见"
  tts:
    template: "请保持身体在画面内"
    templates:
      - "关键点看不清，请保持身体在画面内。"
      - "镜头没有看清动作，请侧对镜头。"
      - "髋膝踝离开画面了，调整一下位置。"
    priority: "medium"
  motor:
    pattern: "short_once"
OK:
  screen:
    color: "green"
    title: "动作完成"
    template: "很好"
  tts:
    template: "很好"
    priority: "low"
  motor:
    pattern: "success_once"
