ROM_LOW:
  screen:
    color: "red"
    title: "动作不到位"
    template: "小腿再往后弯一点"
    templates:
      - "小腿再往后弯一点"
      - "脚跟再靠近臀部一点"
      - "膝盖保持向下，小腿往后收"
  tts:
    template: "小腿再往后弯一点"
    templates:
      - "小腿还没有后勾到位，再往后弯一点。"
      - "脚跟再靠近臀部一点，到位后再放下。"
      - "膝盖保持向下，小腿往后收。"
    priority: "low"
  motor:
    pattern: "short_double"
TUT_LOW:
  screen:
    color: "orange"
    title: "保持时间不足"
    template: "保持住"
    templates:
      - "保持住"
      - "后勾到位后停一下"
      - "别急着放下"
  tts:
    template: "保持住"
    templates:
      - "后勾到位后停一下，再慢慢放下。"
      - "保持时间还不够，这次不计数。"
      - "脚跟收上来以后先稳住。"
    priority: "medium"
  motor:
    pattern: "interval"
SHAPE_BAD:
  screen:
    color: "yellow"
    title: "轨迹不标准"
    template: "按示范节奏完成"
    templates:
      - "按示范节奏完成"
      - "大腿保持稳定"
      - "只让小腿往后勾"
  tts:
    template: "按示范节奏完成"
    templates:
      - "大腿保持稳定，只让小腿往后勾。"
      - "路线再稳一点，按示范节奏来。"
      - "身体站稳，慢慢后勾小腿。"
    priority: "low"
  motor:
    pattern: "short_once"
TOO_FAST:
  screen:
    color: "yellow"
    title: "动作过快"
    template: "慢一点"
    templates:
      - "慢一点"
      - "后勾和放下都慢一些"
      - "节奏放稳"
  tts:
    template: "慢一点"
    templates:
      - "速度慢一点，后勾和放下都要稳。"
      - "这次太快了，下一次慢慢后勾。"
      - "放慢节奏，控制住小腿。"
    priority: "medium"
  motor:
    pattern: "long_once"
EARLY_RETURN:
  screen:
    color: "red"
    title: "提前放下"
    template: "后勾到位后再放下"
    templates:
      - "后勾到位后再放下"
      - "还没弯够就放下了"
      - "脚跟先往后收"
  tts:
    template: "后勾到位后再放下"
    templates:
      - "还没后勾到位就放下了，再试一次。"
      - "脚跟先往后收，到位后再回来。"
      - "这次提前回来了，小腿再多弯一点。"
    priority: "low"
  motor:
    pattern: "short_double"
VISIBILITY_LOW:
  screen:
    color: "yellow"
    title: "关键点不可见"
    template: "请保持髋、膝、踝可见"
    templates:
      - "请保持髋、膝、踝可见"
      - "身体稍微侧对镜头"
      - "腿不要离开画面"
  tts:
    template: "请保持髋、膝、踝可见"
    templates:
      - "关键点看不清，请身体侧对镜头。"
      - "腿离开画面了，请保持髋膝踝可见。"
      - "镜头没有看清动作，调整一下位置。"
    priority: "medium"
  motor:
    pattern: "short_once"
OK:
  screen:
    color: "green"
    title: "动作完成"
    template: "很好"
  tts:
    template: "很好"
    priority: "low"
  motor:
    pattern: "success_once"
