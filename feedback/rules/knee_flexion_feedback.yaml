ROM_LOW:
  screen:
    color: "red"
    title: "动作不到位"
    template: "还差 {rom_diff:.1f} 度，再抬高一点"
    templates:
      - "还差 {rom_diff:.1f} 度，再抬高一点"
      - "动作幅度还差一点"
      - "先做到目标位置再回来"
  tts:
    template: "您还差 {rom_diff:.0f} 度，再抬高一点"
    templates:
      - "动作幅度还差一点，再试一次。"
      - "还没有做到位，先做到目标位置再回来。"
      - "这次幅度不够，下一次再抬高一点。"
  motor:
    pattern: "short_double"

TUT_LOW:
  screen:
    color: "orange"
    title: "保持时间不足"
    template: "请再坚持 {missing_seconds:.1f} 秒"
    templates:
      - "请再坚持 {missing_seconds:.1f} 秒"
      - "到位后停一下"
      - "别急着回来"
  tts:
    template: "保持住，再坚持一下"
    templates:
      - "保持时间还不够，到位后停一下。"
      - "不要急着回来，先稳住一会儿。"
      - "这次保持时间不足，不计数。"
  motor:
    pattern: "interval"

SHAPE_BAD:
  screen:
    color: "yellow"
    title: "动作轨迹不标准"
    template: "动作轨迹偏离模板，请按标准节奏完成"
    templates:
      - "动作轨迹偏离模板，请按标准节奏完成"
      - "动作路线再稳一点"
      - "按示范节奏完成"
  tts:
    template: "动作轨迹不太标准，请按示范节奏完成"
    templates:
      - "动作轨迹不太标准，请按示范节奏完成。"
      - "路线再稳一点，下一次慢慢做。"
      - "这次动作路线偏了，再试一次。"
  motor:
    pattern: "short_once"

TOO_FAST:
  screen:
    color: "yellow"
    title: "动作未完成"
    template: "再抬高一点"
    templates:
      - "再抬高一点"
      - "动作幅度还差一点"
      - "先做到目标位置"
  tts:
    template: "再抬高一点"
    templates:
      - "动作幅度还差一点。"
      - "先做到目标位置。"
      - "再抬高一点。"
  motor:
    pattern: "short_double"

EARLY_RETURN:
  screen:
    color: "red"
    title: "提前返回"
    template: "做到位后再回来"
    templates:
      - "做到位后再回来"
      - "还没做到位就回来了"
      - "先到目标位置"
  tts:
    template: "做到位后再回来"
    templates:
      - "还没做到位就回来了，下一次先到目标位置。"
      - "先做到位，再慢慢回来。"
      - "这次提前回来了，再试一次。"
  motor:
    pattern: "short_double"

VISIBILITY_LOW:
  screen:
    color: "yellow"
    title: "关键点不可见"
    template: "请保持关键点可见"
    templates:
      - "请保持关键点可见"
      - "身体稍微侧对镜头"
      - "不要离开画面"
  tts:
    template: "请保持关键点可见"
    templates:
      - "关键点看不清，请身体侧对镜头。"
      - "动作离开画面了，请调整一下位置。"
      - "镜头没有看清动作，再试一次。"
  motor:
    pattern: "short_once"

OK:
  screen:
    color: "green"
    title: "动作完成"
    template: "很好，这次动作比较标准"
  tts:
    template: "很好，这次动作完成得不错"
  motor:
    pattern: "success_once"
