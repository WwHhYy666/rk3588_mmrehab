action_id: "standing_hamstring_curl"
action_name: "站姿屈膝后勾腿"
pose_schema: "coco17_to_rehab_v1"
primary_metric: "hamstring_curl_flexion_angle"
metric_unit: "degree"
metric_direction: "increase"
keypoint_rule:
  hip_index: 11
  knee_index: 13
  ankle_index: 15
  target_joint: "left_knee"
angle_field: "target_angle_smoothed"
angle_fields:
  - "target_angle_smoothed"
  - "selected_flexion_angle_smoothed"
  - "selected_flexion_angle_raw"
  - "flexion_angle_2d"
metric_note: "NPU 后勾腿使用 COCO-17 左髋、左膝、左踝计算二维膝屈曲角。"
thresholds:
  rom_diff_max: 25.0
  tut_ratio_min: 0.8
  dtw_normalized_max: 0.25
  speed_ratio_max: 1.5
tut_work_zone:
  mode: "relative_to_max"
  offset_low: -10.0
  offset_high: 0.0
realtime:
  segment_mode: "angle_curl"
  rest_window_seconds: 0.7
  rest_noise_max: 3.0
  rest_velocity_max: 8.0
  motion_start_velocity_min: 10.0
  return_velocity_max: -5.0
  start_delta_from_rest: 4.0
  return_delta_from_rest: 5.0
  stable_return_seconds: 0.15
  max_rep_seconds: 5.0
  return_timeout_seconds: 1.5
  interrupt_reset_seconds: 0.4
  reset_on_offscreen: true
  start_delta: 12.0
  attempt_start_delta: 4.0
  return_delta: 5.0
  min_attempt_delta: 3.0
  reentry_start_delta_multiplier: 1.5
  reentry_min_attempt_delta: 6.0
  reentry_start_confirm_frames: 4
  min_rep_seconds: 1.0
  tut_range_padding: 15.0
  tut_ratio_min: 0.65
  raise_prompt: "小腿再往后弯一点"
template_validation:
  min_valid_frames: 20
  min_duration_seconds: 2.0
  peak_edge_fraction: 0.15
  return_rom_tolerance_ratio: 0.20
  min_rom: 45.0
  max_rom: 150.0
