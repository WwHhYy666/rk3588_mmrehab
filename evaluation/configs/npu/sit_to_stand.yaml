action_id: "sit_to_stand"
action_name: "坐站训练"
pose_schema: "coco17_to_rehab_v1"
primary_metric: "hip_rise_height_ratio"
secondary_metric: "knee_extension_angle"
metric_unit: "body_ratio"
metric_direction: "increase"
keypoint_rule:
  hip_index: 11
  knee_index: 13
  ankle_index: 15
  target_joint: "left_knee"
angle_field: "target_angle_smoothed"
angle_fields:
  - "target_angle_smoothed"
  - "selected_flexion_angle_smoothed"
  - "selected_flexion_angle_raw"
  - "flexion_angle_2d"
metric_note: "NPU 坐站训练使用 COCO-17 髋部相对坐姿 baseline 的上升高度，并以肩髋距离归一化。"
thresholds:
  rom_diff_max: 0.08
  secondary_rom_diff_max: 15.0
  tut_ratio_min: 0.85
  dtw_normalized_max: 0.10
  speed_ratio_max: 1.6
tut_work_zone:
  mode: "relative_to_max"
  offset_low: -0.12
  offset_high: 0.0
realtime:
  segment_mode: "sit_to_stand"
  rest_window_seconds: 0.8
  rest_noise_max: 0.035
  rest_velocity_max: 0.08
  motion_start_velocity_min: 0.10
  return_velocity_max: -0.04
  start_delta_from_rest: 0.25
  return_delta_from_rest: 0.08
  stable_return_seconds: 0.2
  interrupt_reset_seconds: 0.4
  start_delta: 0.25
  return_delta: 0.05
  return_to_start_delta: 0.08
  max_rep_seconds: 6.0
  return_timeout_seconds: 2.0
  reset_on_offscreen: true
  min_attempt_delta: 0.22
  reentry_start_delta_multiplier: 1.5
  reentry_min_attempt_delta: 0.24
  reentry_start_confirm_frames: 4
  min_rep_seconds: 1.2
  tut_range_padding: 0.05
  tut_count_mode: "at_or_above_target"
  metric_median_window: 5
  start_pose_gate_enabled: true
  start_pose_confirm_frames: 4
  start_pose_visibility_min: 0.18
  start_pose_geometry_min: 55.0
  start_pose_geometry_max: 140.0
  start_pose_max_joint_motion: 0.035
  start_pose_prompt: "请先坐回椅子并保持坐稳"
  rebaseline_each_rep: true
  post_rep_start_pose_confirm_frames: 4
  post_rep_ready_prompt: "可以开始下一次坐站"
  raise_prompt: "再站起来一点"
template_validation:
  min_valid_frames: 20
  min_duration_seconds: 2.0
  peak_edge_fraction: 0.15
  return_rom_tolerance_ratio: 0.20
  min_rom: 0.35
  max_rom: 1.50
