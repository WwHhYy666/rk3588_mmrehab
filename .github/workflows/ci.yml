name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  desktop-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall rehab_app pose_estimation training evaluation action_feedback action_scoring speech llm scripts tests
      - name: Run tests
        run: python -m pytest
